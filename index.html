<!DOCTYPE html>
<html>
<head>
    <title>✨ Beautiful Task Manager ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>✨ Task Manager Pro ✨</h1>
        <p class="subtitle">Stay organized, beat deadlines with style!</p>

        <div class="button-group">
            <button class="btn btn-add" onclick="addTask()">➕ Add Task</button>
            <button class="btn btn-refresh" onclick="viewTasks()">🔄 Refresh</button>
            <button class="btn btn-complete-all" onclick="completeAllTasks()">✅✅ Complete All</button>
            <button class="btn btn-delete-completed" onclick="deleteCompletedTasks()">🗑️ Delete Completed</button>
            <button class="btn btn-alerts" onclick="checkDetailedAlerts()">⏰ Check Alerts</button>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completionRate">0%</div>
                <div class="stat-label">Completion Rate</div>
            </div>
        </div>

        <div id="alertBox"></div>
        <div id="taskList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
